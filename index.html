<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>职场牛马人格测试</title>
  <meta
    name="description"
    content="16 道选择题，生成牛马人格小报告。仅供娱乐，不用于招聘或心理诊断。"
  />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <a class="skip-link" href="#main">跳到主要内容</a>
  <main id="main" class="app-main" tabindex="-1">
    <!-- Intro: disclaimer + start -->
    <section
      id="screen-welcome"
      class="screen screen--welcome"
      aria-labelledby="welcome-title"
    >
      <div class="welcome-panel">
        <p class="welcome-eyebrow">16 题 人格测试 · 约 3 分钟</p>
        <h1 id="welcome-title">测测你的职场牛马人格</h1>
        <p class="lede welcome-lede">
          牛马人格专属测试题，几分钟做完。图一乐就行，别当正经测评。
        </p>
        <p class="disclaimer welcome-disclaimer" role="note">
          <strong>免责声明：</strong>
          本测试仅供娱乐，切莫用于招聘或心理诊断，更不要当真。
        </p>
        <button type="button" class="btn btn--primary btn--welcome" id="btn-start">
          开始测试
        </button>
      </div>
    </section>

    <!-- Quiz: progress + question + nav -->
    <section
      id="screen-quiz"
      class="screen screen--quiz is-hidden"
      aria-labelledby="quiz-title"
      hidden
    >
      <h2 id="quiz-title" class="visually-hidden">测验进行中</h2>
      <p class="progress" id="quiz-progress" aria-live="polite"></p>
      <p
        id="question-scene"
        class="question-scene"
        aria-live="polite"
        hidden
      ></p>
      <p id="quiz-quip" class="quiz-quip" aria-live="polite" hidden></p>
      <div
        class="question-card"
        role="group"
        aria-labelledby="question-prompt"
      >
        <p class="question-kicker" id="question-kicker">题目</p>
        <div class="question-stem">
          <p id="question-prompt" class="question-prompt" tabindex="-1"></p>
        </div>
        <p class="options-kicker" id="options-kicker">选项</p>
        <div
          class="options"
          id="question-options"
          role="radiogroup"
          aria-labelledby="question-prompt options-kicker"
        ></div>
      </div>
      <div class="quiz-nav">
        <button type="button" class="btn" id="btn-prev" disabled>
          上一题
        </button>
        <button type="button" class="btn btn--primary" id="btn-next" disabled>
          下一题
        </button>
      </div>
    </section>

    <!-- Result: share-friendly card -->
    <section
      id="screen-result"
      class="screen screen--result is-hidden"
      aria-labelledby="result-title"
      hidden
    >
      <div class="result-card" id="result-card">
        <p class="result-kicker">牛马人格掉落</p>
        <img
          id="result-portrait"
          class="result-portrait"
          alt=""
          decoding="async"
          hidden
        />
        <h2 id="result-title" class="result-title"></h2>
        <p
          class="result-subtitle"
          id="result-subtitle"
          hidden
          aria-label="娱乐向游戏化标签，非真实游戏数据"
        ></p>
        <div id="result-body" class="result-body"></div>
        <p class="disclaimer disclaimer--compact" role="note">
          <strong>仅供娱乐与自嘲。</strong>
          不用于招聘筛选、晋升评估、心理或医学诊断。
        </p>
      </div>
      <div class="result-actions">
        <button type="button" class="btn" id="btn-share">
          分享结果
        </button>
        <button type="button" class="btn" id="btn-copy">
          复制文案
        </button>
        <button type="button" class="btn btn--primary" id="btn-retake">
          再测一次
        </button>
      </div>
      <p id="share-status" class="share-status" aria-live="polite"></p>
    </section>
  </main>
  <footer class="app-footer" role="contentinfo">
    <p>职场牛马人格测试</p>
  </footer>
  <script type="module" src="js/app.js"></script>
</body>
</html>
